spring.application.name=control-plane
# Kestra publishes 8080 from the compose world, so the control plane lives one door
# over — the M1 gate walkthrough curls this port.
server.port=8085
# Every API error is an RFC 9457 problem detail (spec #10) — the M3 canvas gets
# machine-readable validation for free.
spring.mvc.problemdetails.enabled=true

# The dataflow database (infra/docker-compose.yml + infra/db-init). The password
# default matches the deliberately committed mock-world infra/.env; override with
# DATAFLOW_DB_PASSWORD where that ever differs.
spring.datasource.url=jdbc:postgresql://localhost:5432/dataflow
spring.datasource.username=dataflow
spring.datasource.password=${DATAFLOW_DB_PASSWORD:dataflow-db-local}

# The Kestra API (infra/docker-compose.yml). Kestra 1.x always authenticates, so the
# client speaks basic auth; defaults match the deliberately committed mock-world
# infra/.env, overridable where that ever differs.
kestra.api.url=http://localhost:8080
kestra.api.username=${KESTRA_UI_USER:admin@dataflow.local}
kestra.api.password=${KESTRA_UI_PASSWORD:KestraAdmin1234!}
