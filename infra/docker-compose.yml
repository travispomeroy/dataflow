# The mock world. Image versions come from docs/versions.md — never bump here.
# Credentials come from infra/.env (committed; mock world only) via compose
# interpolation — run compose with `--project-directory infra` (or from infra/)
# or every ${VAR} below resolves empty and services fail to start.
name: dataflow

volumes:
  postgres-data:
  kestra-data:
  minio-data:

services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      KESTRA_DB_PASSWORD: ${KESTRA_DB_PASSWORD}
      DATAFLOW_DB_PASSWORD: ${DATAFLOW_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      # -h 127.0.0.1 forces TCP, so the socket-only temporary server postgres
      # runs during first-boot init can never report healthy early
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  kestra:
    image: kestra/kestra:v1.3.28
    command: server standalone
    # root: the image's kestra user cannot write a fresh named volume at /app/storage
    user: "root"
    environment:
      KESTRA_CONFIGURATION: |
        # full_content: hand each request to the API only once its body has fully
        # arrived. Kestra 1.3.28's default streamed path has a fatal allocation
        # bug when a body lands in a later TCP read than its headers (as the JDK
        # HTTP client always does): the heap fills within seconds and the GC
        # storm takes down the scheduler and workers with OutOfMemoryError,
        # while the healthcheck stays green. Reproduced with a raw socket —
        # headers and body in one write() is fine, two write()s detonates.
        micronaut:
          server:
            # full_content aggregates via Netty, whose limit is an int; Kestra's
            # default max-request-size overflows it into a negative and every
            # request dies at the pipeline. 256MB is far beyond any POC payload.
            max-request-size: 256MB
            netty:
              server-type: full_content
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: ${KESTRA_DB_PASSWORD}
        kestra:
          server:
            # no `enabled` flag: ignored since 1.x — basic auth is always on,
            # and invalid/weak credentials silently fall back to the setup page
            basic-auth:
              username: "${KESTRA_UI_USER}"
              password: "${KESTRA_UI_PASSWORD}"
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          tutorial-flows:
            enabled: false
    volumes:
      - kestra-data:/app/storage
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # management /health returns non-2xx until repository + queue are UP
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  wiremock:
    image: wiremock/wiremock:3.13.2
    volumes:
      # generator-emitted stubs (infra/fixtures/generate.ts); mappings/ inside
      - ./fixtures/wiremock:/home/wiremock:ro
    ports:
      - "8082:8080"
    healthcheck:
      # unparseable stub files abort startup, so this also gates the stubs
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  sftp:
    # digest pin: atmoz/sftp publishes no immutable tags (docs/versions.md)
    image: atmoz/sftp:alpine@sha256:a6cb3eb29202ca7f57e73bb7e527286e66e0e822fff65609207c7e0ef2d135a3
    # fixed pomeroy user, chrooted home, writable upload/ subdir; the base
    # delivery path below upload/ belongs to the Destination catalog entry (M1)
    command: pomeroy:${SFTP_PASSWORD}:1001:100:upload
    volumes:
      # committed fixed host keys: identity survives container recreation, so
      # the gate's pinned known_hosts never fights host-key churn. Not :ro —
      # the entrypoint chmods them to what sshd requires (git checks out 0644)
      - ./sftp/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key
      - ./sftp/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  nifi:
    image: apache/nifi:2.10.0
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USER}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD}
      # default bind is the container hostname (a random id) — bind everywhere
      # so both the in-container healthcheck and the host reach it as localhost
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
    # no volume: NiFi state is ephemeral until M4 gives the runner real flows;
    # HTTPS with the boot-generated self-signed cert is NiFi 2.x's default
    ports:
      - "8443:8443"
    healthcheck:
      # -k: self-signed cert. The authentication configuration endpoint is the
      # unauthenticated JSON the login page itself uses — it answers 200 only
      # once the web server and REST API are actually serving
      test: ["CMD-SHELL", "curl -skf https://localhost:8443/nifi-api/authentication/configuration"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    # staging bucket provisioning (M2.4): nothing else creates buckets, and the
    # engines' staging writes need one. On this release a directory created
    # under /data before the server starts is adopted as a real bucket
    # (verified: listable, writable, readable) — no init service, so
    # `up --wait` never has to reason about a one-shot container.
    entrypoint: /bin/sh
    command: -c 'mkdir -p /data/staging && exec minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s
